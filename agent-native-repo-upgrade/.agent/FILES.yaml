# FILES.yaml — Complete Source File Index
# Use this instead of glob/grep to locate files.
# key_locations: exact line numbers for important symbols — use offset+limit when reading
# insertion_points: where to add new code without reading the whole file
# before_editing: constraints you'd miss by just reading the file

version: "2.0"

files:

  # ── Entry Point ────────────────────────────────────────────────────────────

  src/app.ts:
    what: "Express app factory — mounts all routes and middleware"
    exports: [app]
    reads_from: []
    writes_to: []
    key_locations:
      imports_end: ~          # update when you read the actual file
      middleware_mount: ~
      routes_start: ~
      routes_end: ~           # insertion_point for new routes
      error_handler: ~
    insertion_points:
      add_route: "after the last route registration, before error handler"
      add_middleware: "before route mounting, after existing middleware"
      add_import: "top of file with other handler imports"
    before_editing:
      - "Adding a route? Also update .agent/ROUTES.yaml and .agent/MANIFEST.yaml"
      - "All /users/* routes except POST /users need authMiddleware (INV-003)"
      - "Route order matters in Express — specific paths before parameterized ones"

  # ── User Domain ────────────────────────────────────────────────────────────

  src/user/user.contract.ts:
    what: "TypeScript interfaces for all user operation inputs/outputs"
    exports: [CreateUserInput, GetUserInput, UpdateUserInput, DeleteUserInput, ListUsersInput, User]
    reads_from: []
    writes_to: []
    before_editing:
      - "Changing a type here affects every handler — run npm test immediately after"
      - "Never add password to any output type"

  src/user/user.create.handler.ts:
    what: "POST /users — creates user, bcrypt-hashes password, stores in userStore"
    exports: [createUser]
    reads_from: [userStore]
    writes_to: [userStore]
    key_locations:
      password_hash: ~        # line where bcrypt.hash is called
      store_write: ~          # line where userStore.set is called
    before_editing:
      - "INV-001: password MUST be bcrypt-hashed (saltRounds >= 10) before write"
      - "Strip password from response — see PATTERNS.yaml#strip_password"
      - "Test contract: TEST_CONTRACTS.yaml#user.create"

  src/user/user.get.handler.ts:
    what: "GET /users/:id — retrieves single user by ID, strips password"
    exports: [getUser]
    reads_from: [userStore]
    writes_to: []
    before_editing:
      - "INV-001: strip password from response"
      - "Test contract: TEST_CONTRACTS.yaml#user.get"

  src/user/user.list.handler.ts:
    what: "GET /users — returns all users, optional ?email= filter, strips passwords"
    exports: [listUsers]
    reads_from: [userStore]
    writes_to: []
    before_editing:
      - "INV-001: strip password from every user in array"
      - "Empty filter match returns [], not 404"
      - "Test contract: TEST_CONTRACTS.yaml#user.list"

  src/user/user.update.handler.ts:
    what: "PATCH /users/:id — updates email/name fields, rejects password field"
    exports: [updateUser]
    reads_from: [userStore]
    writes_to: [userStore]
    before_editing:
      - "Explicitly reject password field with 400 (see TEST_CONTRACTS.yaml#user.update)"
      - "Strip password from response"
      - "Test contract: TEST_CONTRACTS.yaml#user.update"

  src/user/user.delete.handler.ts:
    what: "DELETE /users/:id — removes user from userStore"
    exports: [deleteUser]
    reads_from: [userStore]
    writes_to: [userStore]
    status: broken   # cross-ref STATUS.yaml
    known_issues:
      - "INV-002: does NOT invalidate sessions — active security bug"
    before_editing:
      - "INV-002 FIX: after userStore.delete(userId), call sessionStore.deleteByUserId(userId)"
      - "sessionStore.deleteByUserId() may not exist yet — check src/_shared/db.ts first"
      - "After fix: update STATUS.yaml (user.delete → working) and INVARIANTS.md (INV-002 → RESOLVED)"
      - "Test contract: TEST_CONTRACTS.yaml#user.delete (includes post-delete session test)"

  # ── Auth Domain ────────────────────────────────────────────────────────────

  src/auth/auth.contract.ts:
    what: "TypeScript interfaces for auth operations"
    exports: [LoginInput, LogoutInput, RefreshInput, Session, TokenPair]
    reads_from: []
    writes_to: []
    before_editing:
      - "Changing Session or TokenPair breaks authMiddleware — update together"

  src/auth/auth.login.handler.ts:
    what: "POST /auth/login — validates credentials, creates session, returns TokenPair"
    exports: [login]
    reads_from: [userStore]
    writes_to: [sessionStore]
    before_editing:
      - "Same 401 response for wrong password AND user not found (no user enumeration)"
      - "Test contract: TEST_CONTRACTS.yaml#auth.login"

  src/auth/auth.logout.handler.ts:
    what: "POST /auth/logout — deletes session by token"
    exports: [logout]
    reads_from: [sessionStore]
    writes_to: [sessionStore]
    before_editing:
      - "Test contract: TEST_CONTRACTS.yaml#auth.logout"

  src/auth/auth.refresh.handler.ts:
    what: "POST /auth/refresh — rotates token pair, invalidates old refresh token"
    exports: [refreshToken]
    reads_from: [sessionStore]
    writes_to: [sessionStore]
    before_editing:
      - "Token rotation: delete old session, create new one atomically"
      - "Old refresh token must be invalid after successful refresh"
      - "Test contract: TEST_CONTRACTS.yaml#auth.refresh"

  # ── Shared ─────────────────────────────────────────────────────────────────

  src/_shared/db.ts:
    what: "In-memory stores (userStore, sessionStore) and generateId()"
    exports: [userStore, sessionStore, generateId]
    reads_from: []
    writes_to: [userStore, sessionStore]
    key_locations:
      userStore_declaration: ~
      sessionStore_declaration: ~
      generateId: ~
    missing_methods:
      - "sessionStore.deleteByUserId(userId: string): void — needed for INV-002 fix"
    before_editing:
      - "ALL handlers import from here — any interface change is breaking"
      - "Add deleteByUserId to sessionStore as a method, not a standalone function"
      - "Run full npm test after any change here"

  src/_shared/authMiddleware.ts:
    what: "Express middleware — validates Bearer token, injects req.userId"
    exports: [authMiddleware]
    reads_from: [sessionStore]
    writes_to: []
    key_locations:
      token_extraction: ~     # line that reads Authorization header
      session_lookup: ~       # line that queries sessionStore
      userId_injection: ~     # line that sets req.userId
    before_editing:
      - "req.userId is how handlers know who is making the request — do not remove"
      - "Returning 401 here affects every protected route test"

  # ── Tests ──────────────────────────────────────────────────────────────────

  src/user/user.test.ts:
    what: "Tests for all /users/* routes"
    exports: []
    reads_from: []
    writes_to: []
    before_editing:
      - "See PATTERNS.yaml#new_test for the test structure used here"
      - "beforeEach resets stores — each test starts clean"

  src/auth/auth.test.ts:
    what: "Tests for all /auth/* routes"
    exports: []
    reads_from: []
    writes_to: []
    before_editing:
      - "See PATTERNS.yaml#new_test for the test structure used here"
